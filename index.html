<!doctype html>
<html lang="mk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>За Мама</title>
    <style>
      /* Главни поставки */
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        font-family: "Arial", sans-serif;
        /* Поставување на твојата слика како позадина */
        background-image: url("https://png.pngtree.com/thumb_back/fw800/background/20240204/pngtree-love-valentines-day-background-with-hearts-image_15598675.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      /* Темна прекривка за текстот да биде појасен */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.1); /* Многу лесно затемнување */
        z-index: 0;
      }

      /* Desktop styles first (or use Mobile-first by reversing this) */
      .container {
        display: flex;
      }

      /* Tablet and Mobile styles */
      @media (max-width: 768px) {
        .container {
          flex-direction: column; /* Stacks items vertically */
        }
      }

      .container {
        width: 200px;
        position: relative;
        z-index: 1;
        text-align: center;
        background: rgba(255, 255, 255, 0.75); /* Полупроѕирен панел */
        padding: 60px;
        border-radius: 40px;
        backdrop-filter: blur(5px); /* Заматување на позадината под панелот */
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.5);
      }

      h1 {
        font-size: 50px;
        margin: 0 0 30px -20px;
        color: #d63384;
        text-transform: uppercase;
        letter-spacing: 8px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }

      .btn {
        background-color: #ff4d6d;
        color: white;
        border: none;
        padding: 20px 50px;
        font-size: 24px;
        font-weight: bold;
        border-radius: 60px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
        box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
        text-transform: uppercase;
      }

      .btn:hover {
        background-color: #ff758f;
        transform: scale(1.1);
        box-shadow: 0 10px 25px rgba(255, 77, 109, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ЗДРАВО</h1>
      <button class="btn" onclick="nextPage()">КЛИКНИ МЕ</button>
    </div>

    <script>
      function nextPage() {
        alert("Подготви се за изненадувањето! ❤️");
        // Пренасочување кон страната за најава
        window.location.href = "najava.html";
      }
    </script>
  </body>
</html>
