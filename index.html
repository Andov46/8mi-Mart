<!doctype html>
<html lang="mk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Čestitka 8-mi Mart</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-image: url("https://png.pngtree.com/thumb_back/fw800/background/20240204/pngtree-love-valentines-day-background-with-hearts-image_15598675.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        width: 100%;
        max-width: 400px;
      }

      h1 {
        color: white;
        font-size: 3rem;
        margin-bottom: 30px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .btn {
        display: inline-block;
        background-color: #ff4d6d;
        color: white;
        text-decoration: none;
        padding: 15px 40px;
        border-radius: 50px;
        font-weight: bold;
        font-size: 1.2rem;
        transition:
          transform 0.3s,
          background-color 0.3s;
        box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        margin-bottom: 25px;
        border: none;
        cursor: pointer;
      }

      .btn:hover {
        background-color: #ff758f;
        transform: scale(1.05);
      }

      .btn:active {
        transform: scale(0.95);
      }

      footer {
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.9rem;
        letter-spacing: 0.5px;
      }

      /* Mobile Responsive prilagodbi */
      @media (max-width: 480px) {
        h1 {
          font-size: 2.5rem;
        }
        .container {
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Zdravo</h1>

      <a href="najava.html" class="btn">Klikni Me</a>

      <footer>Website by <strong>Nexora Digital Agency</strong></footer>
    </div>
  </body>
</html>
